
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio 系统结构图</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;700&family=JetBrains+Mono&display=swap');

        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888;
            --accent-orange: #d97706;
            --accent-green: #65a30d;
            --dashed-border: #444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .canvas {
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
        }

        /* Section Layout */
        .section {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            position: relative;
        }

        .number {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 60px;
            line-height: 1;
            font-style: italic;
        }

        .num-1, .num-2 { color: #b45309; opacity: 0.8; }
        .num-3 { color: #4d7c0f; opacity: 0.8; }

        .content-wrap {
            flex: 1;
            padding-top: 10px;
        }

        .title-group h2 {
            font-size: 28px;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .title-group .sub {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 4px;
        }

        .desc-text {
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 8px;
        }

        .orange-highlight {
            color: #d97706;
            font-weight: bold;
        }

        /* Dashed Boxes */
        .dashed-box {
            border: 1.5px dashed var(--dashed-border);
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            color: #ccc;
        }

        /* Illustrations (Simplified CSS) */
        .icon-box {
            width: 80px;
            height: 120px;
            border: 2px solid #555;
            border-radius: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .phone-mock { width: 40px; height: 60px; border: 1px solid #444; margin-bottom: 5px; position: relative;}
        .phone-mock::after { content: '○'; position: absolute; bottom: 2px; left: 15px; font-size: 8px; color: #444;}

        .server-mock { width: 50px; height: 50px; border: 1px solid #444; position: relative; }
        .server-mock::before { content: 'LOCALHOST:3000'; font-size: 4px; position: absolute; top: -8px; left: 0; color: #666; font-family: monospace; }
        .server-mock-lines { padding: 4px; display: flex; flex-direction: column; gap: 4px; }
        .line { height: 2px; background: #333; width: 100%; }

        /* API Cloud */
        .api-cloud {
            position: relative;
            height: 80px;
            width: 120px;
        }
        .api-tag {
            position: absolute;
            border: 1px solid #555;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: #aaa;
        }

        /* Bottom Footer */
        .footer-note {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }

        .summary-box {
            border: 1.5px dashed #666;
            border-radius: 15px;
            padding: 25px;
            line-height: 1.8;
            font-size: 15px;
            color: #eee;
        }

    </style>
</head>
<body>

<div class="canvas">
    
    <!-- SECTION 1 -->
    <div class="section">
        <div class="number num-1">1.</div>
        <div class="icon-box">
            <div class="phone-mock">
                <div style="width: 80%; height: 60%; border: 1px solid #333; margin: 4px auto;"></div>
            </div>
        </div>
        <div class="content-wrap">
            <div class="title-group">
                <h2>播放器界面</h2>
                <div class="sub">a player</div>
            </div>
            <div class="dashed-box">
                web app、PWA 或 localhost 都可以，我这个版本是 PWA
            </div>
        </div>
    </div>

    <!-- SECTION 2 -->
    <div class="section">
        <div class="number num-2">2.</div>
        <div class="icon-box">
            <div class="server-mock">
                <div class="server-mock-lines">
                    <div class="line"></div>
                    <div class="line" style="width: 70%;"></div>
                    <div class="line"></div>
                </div>
            </div>
        </div>
        <div class="content-wrap">
            <div class="title-group">
                <h2>本地服务器</h2>
                <div class="sub">a local server</div>
            </div>
            <div class="desc-text">做所有事情的 <br> <span class="orange-highlight">中枢 ⚙️</span></div>
            <div class="dashed-box" style="width: 150px; font-weight: bold; font-family: 'JetBrains Mono'; color: #fff;">
                Node.js
            </div>
        </div>
    </div>

    <!-- SECTION 3 -->
    <div class="section">
        <div class="number num-3">3.</div>
        <div class="api-cloud">
            <span class="api-tag" style="top: 0; left: 10px; border-color: #b45309;">claude</span>
            <span class="api-tag" style="top: -5px; right: 10px; border-color: #b45309;">netease</span>
            <span class="api-tag" style="bottom: 20px; left: -10px; border-color: #4d7c0f;">upnp</span>
            <span class="api-tag" style="bottom: 15px; right: 20px; border-color: #4d7c0f;">fish</span>
            <span class="api-tag" style="bottom: -10px; left: 15px; border-color: #b45309;">weather</span>
            <span class="api-tag" style="bottom: -5px; right: 0px; border-color: #2563eb;">feishu</span>
        </div>
        <div class="content-wrap">
            <div class="title-group">
                <h2>几个 API</h2>
                <div class="sub">a few APIs</div>
            </div>
            <div class="desc-text">各自管一件事</div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-note">你可以截图把这个结构和这个施工图</div>
    
    <div class="summary-box">
        Claude 做大脑 · 网易云音乐负责音乐 <br>
        Fish Audio 做语音合成 · 飞书 API 读我的日程 <br>
        OpenWeather 接天气 · UPnP 推音乐到家庭音响
    </div>

</div>

</body>
</html>
