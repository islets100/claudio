<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --accent: #d1fadf;
            --bg: #f5f5f5;
        }

        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* 播放器卡片 */
        .player-card {
            background: white;
            width: 320px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* 动态波形图模拟 */
        .waveform {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 40px;
            margin-bottom: 20px;
        }

        .bar {
            width: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                height: 5px;
            }

            to {
                height: 35px;
            }
        }

        .song-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .artist {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* 核心动效：文本段落高亮 */
        .transcript-line {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            display: inline;
        }

        .active {
            background: var(--accent);
            color: black;
            border-radius: 4px;
            padding: 0 4px;
        }
    </style>
</head>

<body>
    <div class="player-card">
        <div class="waveform">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
        </div>
        <div class="song-title">Monday Night Exhale</div>
        <div class="artist">If — Bread</div>
        <div class="transcript">
            <div class="transcript-line">This is Claudio.</div>
            <div class="transcript-line active">It's late on a Monday, and here's a song...</div>
        </div>
    </div>
</body>

</html>
