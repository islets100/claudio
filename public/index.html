<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="Claudio — AI 音乐电台 DJ">
  <link rel="manifest" href="/manifest.json">
  <title>Claudio</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="phone-shell" id="phoneShell">
  <!-- 顶部 -->
  <div class="header-area">
    <div class="logo">
      <div class="name">Claudio</div>
      <div class="status-on-air">
        <div class="pulse-dot"></div>
        <span>ON AIR · DJ MODE</span>
      </div>
    </div>
    <div class="header-right">
      <div class="dot-clock" id="dotClock"></div>
      <div class="weather-badge" id="weatherBadge">--°</div>
    </div>
  </div>

  <!-- 顶部破碎波形 -->
  <div class="top-jagged-viz" id="topViz"></div>

  <!-- 主内容区：三视图切换 -->
  <div class="main-content" id="mainContent">

    <!-- 视图 1：Player -->
    <div class="view view-player active" id="viewPlayer">
      <div class="main-white-card">
        <div class="song-title-group">
          <h1 id="songTitle">Claudio</h1>
          <p id="songArtist">准备好了吗？</p>
        </div>

        <div class="lyrics-section" id="lyricsBox">
          <div class="lyrics-placeholder">点击下方按钮，让 Claudio 为你推荐音乐</div>
        </div>

        <!-- 播放队列列表（LIST 按钮切换显示） -->
        <div class="queue-list" id="queueList" style="display:none">
          <div class="queue-header">
            <span>播放队列</span>
            <span class="queue-count" id="queueCount">0 首</span>
          </div>
          <div class="queue-items" id="queueItems">
            <div class="queue-empty">队列为空，和 Claudio 聊聊让他推荐音乐吧</div>
          </div>
        </div>

        <!-- 镜像波形进度条 -->
        <div class="mid-progress-component">
          <div class="timestamp" id="timeDisplay">0:00</div>
          <div class="waveform-container" id="waveform"><div class="wave-thumb" id="waveThumb"></div></div>
          <div class="btn-play-pause" id="btnPlayPause">
            <div class="play-icon"></div>
          </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
          <button class="nav-btn" data-view="player">⏮</button>
          <button class="nav-btn active" id="listBtn" data-view="player">LIST</button>
          <button class="nav-btn" data-view="player">⏭</button>
        </div>
      </div>
    </div>

    <!-- 视图 2：Profile / Chat -->
    <div class="view view-chat" id="viewChat">
      <div class="chat-panel">
        <div class="chat-header">对话记录</div>
        <div class="chat-stream" id="chatStream">
          <div class="chat-empty">和 Claudio 的对话会出现在这里</div>
        </div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="告诉 Claudio 你想听什么...">
          <button class="chat-send-btn" id="chatSendBtn">↑</button>
        </div>
      </div>
    </div>

    <!-- 视图 3：Settings -->
    <div class="view view-settings" id="viewSettings">
      <div class="settings-panel">
        <div class="settings-header">设置</div>
        <div class="settings-group">
          <label class="setting-row">
            <span>主题</span>
            <select id="themeSelect">
              <option value="dark">深色</option>
              <option value="light">浅色</option>
            </select>
          </label>
          <label class="setting-row">
            <span>TTS 播报</span>
            <input type="checkbox" id="ttsToggle" checked>
          </label>
        </div>
        <div class="settings-group">
          <div class="setting-label">关于</div>
          <p class="settings-about">Claudio v0.1 — 你的个人 AI 音乐 DJ</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部标签栏 -->
  <div class="tab-bar">
    <span class="tab-indicator" id="tabIndicator"></span>
    <button class="tab-btn active" data-tab="player" aria-label="Player">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </button>
    <button class="tab-btn" data-tab="chat" aria-label="Chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="tab-btn" data-tab="settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
